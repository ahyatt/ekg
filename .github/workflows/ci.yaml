name: CI

on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs_version:
          - 29.1
          - 29.2
    steps:
      - name: Set up Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: ${{matrix.emacs_version}}

      - name: Install Eldev
        uses: emacs-eldev/setup-eldev@v1

      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Compile with warnings as errors
        run: |
          eldev -p -dtT compile --warnings-as-errors

      - name: Lint the project
        run: |
          eldev -p -dtT lint

      - name: Test the project
        run: |
          eldev -p -dtT test

  llm-test:
    runs-on: ubuntu-latest
    needs: test
    environment: llm-test
    timeout-minutes: 10
    steps:
      - name: Set up Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: 30.1

      - name: Install Eldev
        uses: emacs-eldev/setup-eldev@v1

      - name: Check out the source code
        uses: actions/checkout@v4

      - name: Run LLM-driven integration tests
        env:
          LLM_TEST_PROVIDER_ELISP: ${{ secrets.LLM_TEST_PROVIDER_ELISP }}
          LLM_TEST_DEBUG: file
        run: |
          eldev -p -dtT test 'llm-test/'

      - name: Collect init diagnostic log
        if: failure()
        run: |
          if [ -f /tmp/ekg-llm-test-init-diag.log ]; then
            cp /tmp/ekg-llm-test-init-diag.log ./ekg-llm-test-init-diag.log
          fi

      - name: Upload debug logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: llm-test-debug-logs
          path: |
            llm-test-debug-*.log
            ekg-llm-test-init-diag.log
          if-no-files-found: ignore
          retention-days: 14
