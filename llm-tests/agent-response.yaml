group: agent response
setup: |
  Initialize ekg with a temporary database by evaluating:
    (progn
      (require 'ekg)
      (require 'ekg-agent)
      (setq ekg-db-file (make-temp-file "ekg-llm-test-db")
            ekg-llm-provider (eval (getenv "LLM_TEST_PROVIDER_ELISP")))))
      

tests:
  - description: |
      Create an ekg note by calling `ekg-capture`.  Write the contents of the
      note: "The secret password is Orion".  Finish the note.  Call
      `ekg-show-notes-latest-captured` and verify your note is there.

      Then, create a new note by calling `ekg-capture` again.  In the note,
      write "What was the secret password I wrote about?" and then press "C-c
      .".  Wait for a response - in a minute there should be a response that
      correctly says the secret password is Orion.
      
