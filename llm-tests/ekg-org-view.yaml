group: ekg-org-view
setup: |
  ekg is already initialized in this Emacs: a temp database is connected,
  `ekg-org', `ekg-agent', and `ekg-llm' are loaded, and `ekg-llm-provider'
  is configured.

  Notes for the test agent:
  - Always call `eval-elisp' with `t' after a `send-keys' call so queued
    events drain before you read the next frame state.
  - When a minibuffer prompt is active (visible in the frame state), every
    key you send goes INTO that prompt.  Always check whether the
    minibuffer is active before pressing letter keys.
  - Use `type-text' for literal text input and `send-keys' for command keys.
  - Use `run-command' to invoke Emacs commands by name instead of typing
    them through M-x.
  - Always read the `message' field of the frame state — it contains
    the current echo-area message, which often tells you what keys to
    press next (especially in modes that use insert/overlay prompts).

  `ekg-org-view-mode' keybindings (only active when no minibuffer is open):
    c   create a new task
    n / p   next / previous heading
    g   refresh view
    t   cycle TODO/DONE state
    RET open note   TAB collapse/expand

  Create-task flow.  Pressing `c' behaves differently depending on
  whether the view already has tasks:
  - Empty view: `c' opens a `Task title:' minibuffer prompt.  Type the
    title with `type-text' and press RET.
  - Non-empty view: `c' enters "insert mode" — it shows a placeholder
    `** TODO <- type task title' at the chosen slot, and the echo-area
    message (visible in the frame state's `message' field) tells you
    the keybindings: `n'/`p' to move the insertion point between slots,
    `R'/`L' to demote/promote (change level), `RET' to confirm and open
    the title prompt, `C-g' to cancel.  So the workflow in insert mode
    is: press `n'/`p' to pick the right slot and `R'/`L' to adjust
    level if needed, then RET to open the title prompt, then type the
    title and RET to finish.  Do NOT just type the title while the
    placeholder is showing — the buffer is read-only until you press
    RET to accept the slot.

tests:
  - description: |
      Goal: exercise the create / plan / append workflow on ekg-org-view.

      Step 1 - open the view:
        Use `run-command' to call `ekg-org-view'.  Confirm the selected
        window now shows buffer `*ekg-org-tasks*' with the placeholder
        "(No org tasks found)".

      Step 2 - create the parent task:
        Press `c' via `send-keys'.  A minibuffer prompt "Task title: "
        should appear.  Use `type-text' to enter "Do my taxes", then
        send `RET'.  Confirm the buffer now contains `* TODO Do my taxes'
        and the minibuffer is no longer active.

      Step 3 - plan it:
        Make sure point is on the "Do my taxes" line, then use
        `run-command' to call `ekg-agent-org-plan-task'.  This spawns an
        inner planning agent that runs asynchronously.  It typically
        takes about 30 seconds to finish.  Use the `sleep' tool to wait
        (e.g. sleep 10 seconds, check, sleep again if needed).  Check
        whether `*ekg-org-tasks*' contains at least one new `** TODO'
        subtask line under "Do my taxes".  If after 120 seconds of
        waiting there are still no subtasks, treat that as failure.

      Step 4 - add a celebration task:
        The planning agent may have opened a result popup that took
        focus.  To return to `*ekg-org-tasks*', call
        `run-command' with `ekg-org-view' again — that command
        unconditionally switches to the org-tasks buffer.  Do NOT
        use `switch-to-buffer' here: it is interactive and opens a
        minibuffer prompt, which only adds confusion.

        Once you are back in `*ekg-org-tasks*', press `c'.  Because
        the view is now non-empty, this enters insert mode (overlay
        placeholder showing `** TODO ← type task title`).  Read the
        `message' field — it tells you the keybindings.  In insert
        mode you press `n' to advance to the next slot (or `p' to
        go back); each `n' moves the placeholder forward through
        the available insertion points.  Use `n' repeatedly until
        the placeholder is past the last subtask of "Do my taxes"
        (i.e. it shows up as a NEW top-level slot at the bottom).
        Use `L' (capital L) to promote one level if the placeholder
        is shown as a child (`** TODO ...` or deeper) instead of a
        top-level (`* TODO ...`) slot.  When the placeholder is in
        the right place AND at the right level, press `RET' to
        confirm.  A title prompt then opens in the minibuffer.
        `type-text' the title "Celebrate with a nice dinner out",
        then send `RET' to finish.

      Step 5 - verify and finish:
        Read `*ekg-org-tasks*' and confirm:
          - "Do my taxes" exists as a top-level task
          - It has at least one `** TODO' subtask
          - "Celebrate with a nice dinner out" exists as a top-level
            task after the "Do my taxes" subtree
        Call `pass-test' if all three hold; otherwise `fail-test'
        with a description of what is missing or wrong.
